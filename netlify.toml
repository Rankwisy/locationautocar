# Next.js: SSR/SSG native. Netlify Prerender extension not needed.
[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
NODE_VERSION = "18"
NPM_FLAGS = "--production=false"

[forms]
enabled = true

[[headers]]
for = "/*"

[headers.values]
X-Frame-Options = "DENY"
X-XSS-Protection = "1; mode=block"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
for = "/*.html"

[headers.values]
Content-Type = "text/html; charset=UTF-8"
Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/assets/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "*.css"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
Content-Type = "text/css; charset=UTF-8"

[[headers]]
for = "*.js"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
Content-Type = "application/javascript; charset=UTF-8"

[[headers]]
for = "*.woff2"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
Content-Type = "font/woff2"

[[headers]]
for = "*.xsl"

[headers.values]
Content-Type = "application/xml; charset=UTF-8"
Cache-Control = "public, max-age=3600"

[[headers]]
for = "/sitemap.xml"

[headers.values]
Content-Type = "application/xml; charset=UTF-8"
Cache-Control = "public, max-age=3600"

[[headers]]
for = "/sitemap_index.xml"

[headers.values]
Content-Type = "application/xml; charset=UTF-8"
Cache-Control = "public, max-age=3600"

[[headers]]
for = "/robots.txt"

[headers.values]
Content-Type = "text/plain; charset=UTF-8"
Cache-Control = "public, max-age=3600"

[[headers]]
for = "/k9b1y8at1ak9tqfd59s66vdqrcp2ag1a.txt"

[headers.values]
Content-Type = "text/plain; charset=UTF-8"
Cache-Control = "public, max-age=3600"

# Enforce www – avoids canonical/sitemap conflict when non-www is requested
[[redirects]]
from = "http://locationautocar.be/*"
to = "https://www.locationautocar.be/:splat"
status = 301
force = true

[[redirects]]
from = "https://locationautocar.be/*"
to = "https://www.locationautocar.be/:splat"
status = 301
force = true

[[redirects]]
from = "/admin/*"
to = "/admin/index.html"
status = 200

[[redirects]]
from = "/contact-success"
to = "/contactez-nous?success=true"
status = 302

# Legacy URLs -> canonical routes (preserve backlinks / avoid 404s)
[[redirects]]
